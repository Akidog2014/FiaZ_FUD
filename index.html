<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testformular</title>

<style>
    body { font-family: Arial; padding: 20px; }

    /* Allgemeine Eingabefelder etwas schmaler */
    input[type="text"], input[type="time"], select {
        margin: 5px 0;
        padding: 5px 8px;       /* kleineres Padding */
        width: 80%;             /* schmaler als 100% */
        font-size: 14px;        /* etwas kleinere Schrift */
    }

    /* Buttons kleiner */
    button {
        margin: 5px 0;
        padding: 6px 12px;      /* kleineres Padding */
        font-size: 14px;        /* kleinere Schrift */
        width: auto;            /* Breite nach Inhalt */
    }

    .hidden { display: none; }
</style>

</head>

<body onload="startZeit()">

<h1 style="text-align:center; margin-bottom: 30px;">
    Prüfung Fahrfähigkeit
</h1>

<h2>Personendaten</h2>
<input type="text" id="name" placeholder="Name">
<input type="text" id="vorname" placeholder="Vorname">

<input type="text" id="geburt" placeholder="TTMMJJJJ" inputmode="numeric" oninput="formatGeburt(this)">

<input type="text" id="kontrollschild" placeholder="Kontrollschild"
       oninput="this.value = this.value.toUpperCase()"
       style="text-transform: uppercase;">

<h2>Kontrollbeginn</h2>
<input type="time" id="startzeit">

<h2>Atemalkoholtest 1</h2>
<button onclick="zeit1()">Atemalkoholtest 1</button>
<p id="zeit1"></p>
<input type="text" id="wert1" placeholder="Wert eingeben">

<h2>Atemalkoholtest 2</h2>
<button onclick="zeit2()">Atemalkoholtest 2</button>
<p id="zeit2"></p>
<input type="text" id="wert2" placeholder="Wert eingeben">

<h2>Atemtestgerät</h2>
<select id="geraet">
    <option value="">Bitte auswählen</option>
    <option value="Pil 231, SN.20040130">Pil 231, SN.20040130</option>
    <option value="Pil 298, SN.18110193">Pil 298, SN.18110193</option>
    <option value="Pil 296, SN.25550200">Pil 296, SN.25550200</option>
    <option value="Pil 297, SN.25550199">Pil 297, SN.25550199</option>
    <option value="Pil 264, SN.24550828">Pil 264, SN.24550828</option>
    <option value="Pil 265, SN.25550201">Pil 265, SN.25550201</option>
    <option value="Pil 270, SN.17100221">Pil 270, SN.17100221</option>
</select>

<h2>Drogenschnelltest</h2>
<button onclick="zeit3()">Drogenschnelltest</button>
<p id="zeit3"></p>

<button onclick="zeigePositiv()">Positiv</button>
<button onclick="zeigeNegativ()">Negativ</button>

<div id="drogenListe" class="hidden">
    <p>Auswahl:</p>
    <label><input type="checkbox" value="Cannabis"> Cannabis</label><br>
    <label><input type="checkbox" value="Benzodiazepine"> Benzodiazepine</label><br>
    <label><input type="checkbox" value="Amphetamine"> Amphetamine</label><br>
    <label><input type="checkbox" value="Kokain"> Kokain</label><br>
    <label><input type="checkbox" value="Opiate"> Opiate</label>
</div>

<h2>Absenden</h2>
<button onclick="weiter()">Weiter zur Empfängerauswahl</button>

<script>
let start = "", t1="", t2="", t3="", drogenStatus="";

function jetzt() {
    let d = new Date();
    let stunden = String(d.getHours()).padStart(2, '0');
    let minuten = String(d.getMinutes()).padStart(2, '0');
    return stunden + ":" + minuten;
}

function startZeit() {
    let aktuelleZeit = jetzt();
    document.getElementById("startzeit").value = aktuelleZeit;
    start = aktuelleZeit;
}

function zeit1() {
    t1 = jetzt();
    document.getElementById("zeit1").innerText = t1;
}

function zeit2() {
    t2 = jetzt();
    document.getElementById("zeit2").innerText = t2;
}

function zeit3() {
    t3 = jetzt();
    document.getElementById("zeit3").innerText = t3;
}

function zeigePositiv() {
    drogenStatus = "Positiv";
    document.getElementById("drogenListe").classList.remove("hidden");
}

function zeigeNegativ() {
    drogenStatus = "Negativ";
    document.getElementById("drogenListe").classList.add("hidden");
}

function formatGeburt(input) {
    let v = input.value.replace(/\D/g, "").substring(0, 8);

    if (v.length > 4) {
        input.value = v.substring(0,2) + "." + v.substring(2,4) + "." + v.substring(4);
    } else if (v.length > 2) {
        input.value = v.substring(0,2) + "." + v.substring(2);
    } else {
        input.value = v;
    }
}

function weiter() {
    start = document.getElementById("startzeit").value;

    let name = document.getElementById("name").value;
    let vorname = document.getElementById("vorname").value;
    let geburt = document.getElementById("geburt").value;
    let kontrollschild = document.getElementById("kontrollschild").value;

    let wert1 = document.getElementById("wert1").value;
    let wert2 = document.getElementById("wert2").value;
    let geraet = document.getElementById("geraet").value;

    let ausgewählt = [];
    document.querySelectorAll("#drogenListe input:checked").forEach(el => {
        ausgewählt.push(el.value);
    });

    let text =
`Kontrollbeginn: ${start}

Name: ${name}
Vorname: ${vorname}
Geburtsdatum: ${geburt}
Kontrollschild: ${kontrollschild}

Atemalkoholtest 1:
Zeit: ${t1}
Wert: ${wert1}

Atemalkoholtest 2:
Zeit: ${t2}
Wert: ${wert2}
Gerät: ${geraet}

Drogentest:
Zeit: ${t3}
Status: ${drogenStatus}
Substanzen: ${ausgewählt.join(", ")}`;

    window.location.href = "mail.html?text=" + encodeURIComponent(text);
}
</script>

</body>
</html>
