<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empfänger wählen</title>

<style>
    body { font-family: Arial; padding: 20px; }
    select, button { padding: 10px; width: 100%; margin-top: 10px; }
</style>
</head>

<body>

<h2>Empfänger auswählen</h2>

<label>Empfänger 1:</label>
<select id="empfaenger1">
    <option value="">-- Bitte wählen --</option>
    <option value="marco.wueest@lu.ch">Wüest Marco</option>
    <option value="daniela.koch@gmx.ch">Koch Daniela</option>
</select>

<label>Empfänger 2:</label>
<select id="empfaenger2">
    <option value="">-- Optional --</option>
    <option value="marco.wueest@lu.ch">Wüest Marco</option>
    <option value="daniela.koch@gmx.ch">Koch Daniela</option>
</select>

<button onclick="senden()">E-Mail senden</button>

<script>
function getText() {
    let params = new URLSearchParams(window.location.search);
    return params.get("text");
}

function senden() {
    let e1 = document.getElementById("empfaenger1").value;
    let e2 = document.getElementById("empfaenger2").value;
    let text = getText();

    if (!e1 && !e2) {
        alert("Bitte mindestens einen Empfänger auswählen!");
        return;
    }

    let emails = [];

    if (e1) emails.push(e1);
    if (e2 && e2 !== e1) emails.push(e2);

    let empfaengerString = emails.join(";");

    window.location.href =
        "mailto:" + empfaengerString +
        "?subject=Testergebnis&body=" + encodeURIComponent(text);
}
</script>

</body>
</html>
